version: 1
applications:
  - appRoot: gg-landing
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: gg-landing
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            - if [ -d gg-landing ]; then env | grep -e '^SUPABASE_URL=' -e '^SUPABASE_SECRET_KEY=' >> gg-landing/.env.production; else env | grep -e '^SUPABASE_URL=' -e '^SUPABASE_SECRET_KEY=' >> .env.production; fi
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
